services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-native-se-api
    env_file:
      - .env
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
